<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a0a2e 0%, #16213e 50%, #0f0f23 100%);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Georgia', serif;
        }
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.3) 100%);
        }
        .title {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 3rem;
            text-shadow: 0 0 20px rgba(255,100,150,0.8), 0 0 40px rgba(255,50,100,0.6);
            opacity: 0;
            animation: fadeInOut 8s ease-in-out infinite;
            z-index: 100;
            text-align: center;
            pointer-events: none;
        }
        .title span {
            display: block;
            font-size: 1.2rem;
            margin-top: 10px;
            opacity: 0.7;
        }
        @keyframes fadeInOut {
            0%, 100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            10%, 30% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0; transform: translate(-50%, -50%) scale(1.2); }
        }
        .hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.4);
            font-size: 14px;
            pointer-events: none;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }
        .music-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s;
            z-index: 200;
        }
        .music-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.1);
        }
        .music-btn svg {
            width: 24px;
            height: 24px;
            fill: rgba(255,255,255,0.7);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="overlay"></div>
    <div class="title" id="title">
        献给我的爱人
        <span>Click to create roses 🌹</span>
    </div>
    <button class="music-btn" id="musicBtn" title="Toggle Music">
        <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
    </button>
    <div class="hint">✨ 点击屏幕 · 创造浪漫 ✨</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        let roses = [];
        let hearts = [];
        let sparkles = [];
        let mouseX = 0, mouseY = 0;
        let isPlaying = false;

        // Audio context for music
        let audioCtx = null;
        let oscillator = null;
        let gainNode = null;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // ============ 玫瑰类 ============
        class Rose {
            constructor(x, y, size = 50) {
                this.x = x;
                this.y = y;
                this.size = size;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.02;
                this.petalCount = Math.floor(Math.random() * 4) + 6;
                this.hue = Math.random() * 40 + 330;
                this.life = 0;
                this.maxLife = 400;
                this.opacity = 1;
                this.swayAngle = 0;
                this.swaySpeed = Math.random() * 0.02 + 0.01;
            }

            draw() {
                const progress = this.life / this.maxLife;
                const fadeIn = Math.min(progress * 10, 1);
                const fadeOut = this.life > this.maxLife * 0.7 ? 1 - (this.life - this.maxLife * 0.7) / (this.maxLife * 0.3) : 1;
                const currentSize = this.size * (0.5 + progress * 0.5) * fadeIn * fadeOut;

                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation + this.swayAngle);

                // 发光效果
                const glowIntensity = Math.sin(progress * Math.PI) * 0.5;
                ctx.shadowColor = `hsla(${this.hue}, 100%, 60%, ${glowIntensity})`;
                ctx.shadowBlur = 30;

                // 花瓣
                for (let i = 0; i < this.petalCount; i++) {
                    ctx.beginPath();
                    const angle = (i * Math.PI * 2) / this.petalCount;
                    const petalLength = currentSize;

                    ctx.moveTo(0, 0);
                    for (let t = 0; t <= Math.PI; t += 0.1) {
                        const r = petalLength * (0.2 + 0.8 * Math.sin(t * 2.5));
                        const px = Math.cos(t + angle) * r;
                        const py = Math.sin(t + angle) * r * 0.6;
                        ctx.lineTo(px, py);
                    }
                    ctx.closePath();

                    const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, petalLength);
                    gradient.addColorStop(0, `hsla(${this.hue}, 90%, 50%, 0.9)`);
                    gradient.addColorStop(0.5, `hsla(${this.hue}, 80%, 40%, 0.7)`);
                    gradient.addColorStop(1, `hsla(${this.hue}, 70%, 30%, 0.3)`);
                    ctx.fillStyle = gradient;
                    ctx.fill();
                }

                // 花蕊
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.arc(0, 0, currentSize * 0.12, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue + 30}, 100%, 70%, 1)`;
                ctx.fill();

                // 花蕊细节
                for (let i = 0; i < 5; i++) {
                    const angle = (i * Math.PI * 2) / 5;
                    ctx.beginPath();
                    ctx.arc(
                        Math.cos(angle) * currentSize * 0.05,
                        Math.sin(angle) * currentSize * 0.05,
                        currentSize * 0.02,
                        0, Math.PI * 2
                    );
                    ctx.fillStyle = `hsla(${this.hue + 50}, 100%, 80%, 0.8)`;
                    ctx.fill();
                }

                ctx.restore();
            }

            update() {
                this.life++;
                this.rotation += this.rotationSpeed;
                this.swayAngle = Math.sin(this.life * this.swaySpeed) * 0.2;
                return this.life < this.maxLife;
            }
        }

        // ============ 粒子类 ============
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = (Math.random() - 0.5) * 4;
                this.size = Math.random() * 4 + 2;
                this.color = color;
                this.life = 0;
                this.maxLife = 60;
                this.gravity = 0.05;
            }

            draw() {
                const alpha = 1 - this.life / this.maxLife;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * alpha, 0, Math.PI * 2);
                ctx.fillStyle = this.color.replace('1)', `${alpha})`);
                ctx.fill();
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                this.vx *= 0.99;
                this.life++;
                return this.life < this.maxLife;
            }
        }

        // ============ 心形类 ============
        class Heart {
            constructor() {
                this.x = Math.random() * width;
                this.y = height + 50;
                this.size = Math.random() * 20 + 10;
                this.speedY = -(Math.random() * 2 + 1);
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.02;
                this.opacity = Math.random() * 0.5 + 0.5;
                this.wobble = 0;
                this.wobbleSpeed = Math.random() * 0.05 + 0.02;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x + Math.sin(this.wobble) * 20, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = this.opacity;

                ctx.beginPath();
                const s = this.size;
                ctx.moveTo(0, s * 0.3);
                ctx.bezierCurveTo(-s * 0.5, -s * 0.3, -s, s * 0.1, 0, s);
                ctx.bezierCurveTo(s, s * 0.1, s * 0.5, -s * 0.3, 0, s * 0.3);

                const gradient = ctx.createLinearGradient(0, -s, 0, s);
                gradient.addColorStop(0, 'rgba(255,100,150,0.8)');
                gradient.addColorStop(1, 'rgba(255,50,100,0.4)');
                ctx.fillStyle = gradient;
                ctx.fill();

                // 发光
                ctx.shadowColor = 'rgba(255,100,150,0.5)';
                ctx.shadowBlur = 20;
                ctx.fill();

                ctx.restore();
            }

            update() {
                this.y += this.speedY;
                this.x += this.speedX + Math.sin(this.wobble) * 0.5;
                this.rotation += this.rotationSpeed;
                this.wobble += this.wobbleSpeed;
                return this.y > -50;
            }
        }

        // ============ 闪光类 ============
        class Sparkle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 3 + 1;
                this.life = 0;
                this.maxLife = 30;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 3 + 1;
                this.hue = Math.random() * 60 + 300;
            }

            draw() {
                const progress = this.life / this.maxLife;
                const alpha = 1 - progress;
                const currentSize = this.size * (1 - progress * 0.5);

                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                ctx.beginPath();
                ctx.moveTo(-currentSize * 2, 0);
                ctx.lineTo(0, -currentSize * 0.5);
                ctx.lineTo(currentSize * 2, 0);
                ctx.lineTo(0, currentSize * 0.5);
                ctx.closePath();

                ctx.fillStyle = `hsla(${this.hue}, 100%, 70%, ${alpha})`;
                ctx.shadowColor = `hsla(${this.hue}, 100%, 70%, ${alpha})`;
                ctx.shadowBlur = 10;
                ctx.fill();

                ctx.restore();
            }

            update() {
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
                this.speed *= 0.95;
                this.life++;
                return this.life < this.maxLife;
            }
        }

        // ============ 创建效果 ============
        function createRoseBurst(x, y) {
            // 创建多朵玫瑰
            for (let i = 0; i < 8; i++) {
                setTimeout(() => {
                    const offsetX = (Math.random() - 0.5) * 100;
                    const offsetY = (Math.random() - 0.5) * 100;
                    roses.push(new Rose(x + offsetX, y + offsetY, Math.random() * 40 + 30));
                }, i * 80);
            }

            // 创建粒子
            for (let i = 0; i < 30; i++) {
                const color = `hsla(${Math.random() * 40 + 330}, 100%, 70%, 1)`;
                particles.push(new Particle(x, y, color));
            }

            // 创建闪光
            for (let i = 0; i < 20; i++) {
                sparkles.push(new Sparkle(x, y));
            }
        }

        function createHeartBurst(x, y) {
            for (let i = 0; i < 5; i++) {
                hearts.push(new Heart());
            }
        }

        // ============ 背景心形 ============
        function spawnBackgroundHeart() {
            if (hearts.length < 20 && Math.random() < 0.03) {
                hearts.push(new Heart());
            }
        }

        // ============ 事件监听 ============
        canvas.addEventListener('click', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            createRoseBurst(mouseX, mouseY);

            if (isPlaying) {
                playTone();
            }
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
            createRoseBurst(mouseX, mouseY);
        });

        // ============ 音乐 ============
        const musicBtn = document.getElementById('musicBtn');
        musicBtn.addEventListener('click', () => {
            isPlaying = !isPlaying;
            musicBtn.style.background = isPlaying ? 'rgba(255,100,150,0.3)' : 'rgba(255,255,255,0.1)';

            if (isPlaying && !audioCtx) {
                initAudio();
            }
        });

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            gainNode = audioCtx.createGain();
            gainNode.connect(audioCtx.destination);
            gainNode.gain.value = 0.3;
        }

        function playTone() {
            if (!audioCtx || !isPlaying) return;

            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.connect(g);
            g.connect(audioCtx.destination);

            const notes = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25];
            osc.frequency.value = notes[Math.floor(Math.random() * notes.length)];
            osc.type = 'sine';

            g.gain.setValueAtTime(0.3, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        // ============ 动画循环 ============
        function animate() {
            // 渐变背景
            ctx.fillStyle = 'rgba(15, 10, 30, 0.15)';
            ctx.fillRect(0, 0, width, height);

            // 绘制心形背景
            hearts.forEach(h => h.draw());
            hearts = hearts.filter(h => h.update());

            // 绘制玫瑰
            roses.forEach(r => r.draw());
            roses = roses.filter(r => r.update());

            // 绘制粒子
            particles.forEach(p => p.draw());
            particles = particles.filter(p => p.update());

            // 绘制闪光
            sparkles.forEach(s => s.draw());
            sparkles = sparkles.filter(s => s.update());

            // 自动生成背景心形
            spawnBackgroundHeart();

            // 鼠标跟随光效
            if (mouseX && mouseY) {
                ctx.beginPath();
                const gradient = ctx.createRadialGradient(mouseX, mouseY, 0, mouseX, mouseY, 50);
                gradient.addColorStop(0, 'rgba(255,100,150,0.1)');
                gradient.addColorStop(1, 'rgba(255,100,150,0)');
                ctx.fillStyle = gradient;
                ctx.arc(mouseX, mouseY, 50, 0, Math.PI * 2);
                ctx.fill();
            }

            requestAnimationFrame(animate);
        }

        // ============ 初始化 ============
        // 创建初始玫瑰
        setTimeout(() => {
            createRoseBurst(width * 0.5, height * 0.5);
        }, 500);

        setTimeout(() => {
            createRoseBurst(width * 0.3, height * 0.4);
        }, 1500);

        setTimeout(() => {
            createRoseBurst(width * 0.7, height * 0.6);
        }, 2500);

        animate();
    </script>
</body>
</html>
