<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rose 🌹</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        canvas {
            display: block;
        }
        .hint {
            position: fixed;
            bottom: 20px;
            color: rgba(255,255,255,0.5);
            font-family: 'Georgia', serif;
            font-size: 14px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="hint">Click anywhere to create more roses ✨</div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let roses = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Rose {
            constructor(x, y) {
                this.x = x || Math.random() * width;
                this.y = y || Math.random() * height;
                this.size = Math.random() * 30 + 20;
                this.speed = Math.random() * 0.5 + 0.2;
                this.angle = Math.random() * Math.PI * 2;
                this.petalCount = Math.floor(Math.random() * 3) + 5;
                this.hue = Math.random() * 30 + 340;
                this.life = 0;
                this.maxLife = 300;
                this.opacity = 1;
            }

            draw() {
                const { x, y, size, angle, petalCount, hue, life, maxLife } = this;
                const progress = life / maxLife;
                const currentSize = size * (0.5 + progress * 0.5);
                const currentOpacity = life < maxLife * 0.8 ? 1 : (maxLife - life) / (maxLife * 0.2);

                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(angle + progress * 0.5);
                ctx.globalAlpha = currentOpacity;

                for (let i = 0; i < petalCount; i++) {
                    ctx.beginPath();
                    ctx.fillStyle = `hsla(${hue}, 80%, ${50 + Math.sin(progress * Math.PI) * 20}%, 0.9)`;
                    for (let j = 0; j <= 20; j++) {
                        const t = (j / 20) * Math.PI;
                        const r = currentSize * (0.3 + 0.7 * Math.sin(t * 3));
                        const px = Math.cos(t + (i * Math.PI * 2) / petalCount) * r;
                        const py = Math.sin(t + (i * Math.PI * 2) / petalCount) * r * 0.6;
                        j === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
                    }
                    ctx.closePath();
                    ctx.fill();
                }

                ctx.fillStyle = `hsla(${hue + 20}, 90%, 30%, 0.8)`;
                ctx.beginPath();
                ctx.arc(0, 0, currentSize * 0.15, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }

            update() {
                this.life++;
                this.angle += this.speed * 0.01;
                return this.life < this.maxLife;
            }
        }

        function createRose(x, y) {
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    roses.push(new Rose(x, y));
                }, i * 100);
            }
        }

        for (let i = 0; i < 3; i++) {
            setTimeout(() => {
                createRose(Math.random() * width, Math.random() * height);
            }, i * 500);
        }

        canvas.addEventListener('click', (e) => {
            createRose(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            createRose(touch.clientX, touch.clientY);
        });

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);

            roses = roses.filter(rose => {
                rose.draw();
                return rose.update();
            });

            if (roses.length < 15 && Math.random() < 0.02) {
                createRose(Math.random() * width, Math.random() * height);
            }

            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
